[workspace]
name = "multiregex"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]
preview = ["pixi-build"]

[package]
name = "multiregex"
[package.build.backend]
name = "pixi-build-python"
version = "*"
[package.host-dependencies]
python = ">=3.10"
hatchling = "*"

[dependencies]
multiregex = { path = "." }
pyahocorasick = "*"

[feature.test.dependencies]
<<<<<<< before updating
pytest = ">=6,<8"
||||||| last update
pytest = ">=6"
=======
pytest = "*"
>>>>>>> after updating
pytest-cov = "*"
mypy = "*"
[feature.test.tasks]
test = "pytest"
test-coverage = "pytest --cov=multiregex --cov-report=xml --cov-report=term-missing"

[feature.build.dependencies]
python = "*"
hatchling = "*"
python-build = "*"
twine = ">=6"
[feature.build.tasks]
build-wheel = "python -m build --no-isolation ."
check-wheel = "twine check dist/*"

[feature.lint.dependencies]
lefthook = "*"
ruff = "*"
prettier = "*"
taplo = "*"
pre-commit-hooks = "*"
typos = "*"
zizmor = "*"
[feature.lint.tasks]
pre-commit-install = "lefthook install"
lint = "lefthook run pre-commit --all-files"

[feature.py310.dependencies]
python = "3.10.*"
[feature.py311.dependencies]
python = "3.11.*"
[feature.py312.dependencies]
python = "3.12.*"
[feature.py313.dependencies]
python = "3.13.*"
[feature.py314.dependencies]
python = "3.14.*"

[environments]
default = ["test", "build", "lint"]
py310 = ["py310", "test"]
py311 = ["py311", "test"]
py312 = ["py312", "test"]
py313 = ["py313", "test"]
py314 = ["py314", "test"]
